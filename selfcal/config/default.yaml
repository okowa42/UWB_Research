# selfcal 既定パラメータ(正本) — 単位はすべて mm / deg / s
# 仕様書 v1.1 準拠。TBD は §tbd に集約し、確定時に値差し替えのみで済ませる。

# --- 配置 (A) ---
deployment:
  n_anchors: 8              # N_a 公称(E1)。スイープ候補: [4,6,8,9,12]
  pattern: perimeter        # 意図配置パターン名(deployment.py が解釈)
  area_mm: 100000.0         # 配置エリア一辺(100 m)
  z_nominal_mm: 1500.0      # 一般アンカーの公称高さ
  sigma_deploy_mm: 300.0    # 水平方向の展開誤差 σ_deploy
  sigma_v_mm: 150.0         # 鉛直方向の展開誤差 σ_v(v1.1 公称150)。スイープ [50,150,300]
  height_pattern: null      # E2c: 未知アンカー意図高さパターン識別子(記録用ラベル)
  unknown_z_spec: null      # E2c: 未知アンカー高さ指定 {levels:[...]} / {uniform:[lo,hi]}。null=全台 z_nominal

# --- 既知アンカー (G1) ---
# 非共面必須(共面だと鏡映が固定できない)。3台 z=1500, 1台 z=2900。
known:
  k_known: 4                # 固定する既知アンカー数
  known_idx: [0, 1, 2, 3]   # 固定するアンカー index
  known_z_mm: [1500.0, 1500.0, 1500.0, 2900.0]

# --- 測距 (B) ---
ranging:
  r_max_mm: 150000.0        # 通信可能距離(v1.1: 150 m)。超過ペアは NaN(欠測)
  sigma_r_mm: 100.0         # 測距ノイズ σ_r(DW1000 標準 ±100mm, 調査②信頼度A)
  averaging_m: 1            # m回平均オプション。実効 σ_r = σ_r/√m
  sigma_r_range_dependent: false   # TBD-6: R_max<=150m の限り false

# --- 自己校正 (C) ---
calibration:
  gauge: known              # 'known'(G1: 既知点固定) | 'convention'(G2: 規約固定)
  dof: 3                    # 3=3D校正 / 2=z固定2D校正(E3, v1.1)
  estimator: lm             # 第一実装。method は trf(v1.1確定)
  lm_method: trf            # scipy least_squares method. 'lm' は比較用
  max_nfev: 2000
  ftol: 1.0e-12
  xtol: 1.0e-12

# --- タグ測位 (D) ---
tag_positioning:
  enabled: true
  grid_span_mm: 100000.0    # タググリッド一辺(100 m)
  grid_step_mm: 5000.0      # グリッド間隔(5 m)
  grid_z_mm: [0.0, 2000.0]  # タグ高さ(2層)

# --- モンテカルロ ---
montecarlo:
  n_mc: 100                 # 1条件あたり試行数
  seed: 20260713            # 実験ルートseed(rng.py が階層展開)

# --- 集計 (E) ---
metrics:
  coverage_level: 0.95      # C(ε_thr) の水準
  epsilon_thr_mm: 200.0     # カバレッジ閾値

# --- TBD プレースホルダ(仕様§9) — コード分岐を増やさず値のみ差し替え ---
tbd:
  p_nlos: 0.0               # TBD: NLOS発生率(第一版0)
  mu_nlos_mm: 3800.0        # TBD: NLOS正バイアス平均
  b_r_mm: 0.0               # TBD: 系統的測距バイアス(感度枠 ±100mm)
